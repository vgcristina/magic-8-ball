<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magic 8 Ball</title>
    <link rel="stylesheet" href="./css/estilos.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Orbitron:wght@400..900&display=swap");
    </style>
  </head>

  <body>
    <div class="div-principal">
      <section class="sec-question">
        <div class="tittle-question">
          <h1>✨ ¿Qué te dirán hoy los astros? ✨</h1>
          <h2>Hazle una pregunta a la bola, y ella te contestará...</h2>
        </div>
      </section>

      <div class="div-form-ball">
        <div class="div-form">
          <div class="div-temas">
            <button type="submit" id="btnGeneral" class="btn btn-tema">
              General
            </button>
            <button type="submit" id="btnAmor" class="btn btn-tema">
              Amor
            </button>
            <button type="submit" id="btnSalud" class="btn btn-tema">
              Salud
            </button>
            <button type="submit" id="btnDinero" class="btn btn-tema">
              Dinero
            </button>
          </div>

          <form action="" class="form-ball">
            <div>
              <input
                type="text"
                id="question"
                class="input-text"
                placeholder="Escribe tu pregunta aquí..."
                autocomplete="off"
              />
              <button type="submit" id="btnQuestion" class="btn btn-question">
                Preguntar
              </button>
            </div>
          </form>
        </div>

        <div class="div-ball">
          <div class="magic-ball" id="magicBall">
            <div class="number-ball">
              <output id="result" class="output-text" for="question answer"
                >8</output
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="./js/app.js"></script>
  </body>
</html>
